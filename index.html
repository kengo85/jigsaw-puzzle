<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>たのしいジグソーパズル（修正版）</title>
    <style>
        body { text-align: center; font-family: 'Helvetica Neue', Arial, sans-serif; background: #eef7f2; color: #333; margin: 0; padding: 10px; overflow: hidden; /* 画面全体のスクロールを防ぐ */ }
        h1 { color: #2a7a4a; font-size: 20px; margin: 5px 0; }
        .menu-group { background: white; padding: 10px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: inline-block; margin-bottom: 10px; z-index: 100; position: relative; }
        label, button { font-size: 14px; font-weight: bold; padding: 6px 12px; margin: 3px; border-radius: 8px; border: none; cursor: pointer; display: inline-block; vertical-align: middle; }
        select { font-size: 14px; padding: 6px; border-radius: 8px; border: 2px solid #ccc; vertical-align: middle; }
        .btn-green { background: #4caf50; color: white; }
        .btn-blue { background: #2196f3; color: white; }
        #file-input { display: none; }
        
        #game-area { position: relative; width: 100%; height: calc(100vh - 120px); /* メニュー下の全エリア */ background: #ddd; border: 4px solid #2a7a4a; border-radius: 8px; overflow: hidden; }
        #canvas { display: block; position: absolute; top: 0; left: 0; }
        
        #clear-message { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(255,255,255,0.95); padding: 20px 40px; border-radius: 20px; border: 5px solid #ffeb3b; font-size: 32px; font-weight: bold; color: #ff5722; animation: pop 0.5s ease-out; pointer-events: none; z-index: 200; }
        @keyframes pop { 0% { transform: translate(-50%, -50%) scale(0); } 100% { transform: translate(-50%, -50%) scale(1); } }
    </style>
</head>
<body>

    <h1>🧩 たのしいジグソーパズル 🧩</h1>

    <div class="menu-group">
        <label for="difficulty">むずかしさ：</label>
        <select id="difficulty">
            <option value="3">かんたん (9)</option>
            <option value="4" selected>ふつう (16)</option>
            <option value="5">むずかしい (25)</option>
        </select>
        <button class="btn-green" id="btn-sample">ちがう絵</button>
        <button class="btn-blue" onclick="document.getElementById('file-input').click()">写真</button>
        <input type="file" id="file-input" accept="image/*">
        <button class="btn-blue" id="btn-hint">👁 おてほん</button>
    </div>

    <div id="game-area">
        <canvas id="canvas"></canvas>
        <div id="clear-message">🎉 クリア！おめでとう！ 🎉</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const gameArea = document.getElementById('game-area');
        const difficultySelect = document.getElementById('difficulty');
        const fileInput = document.getElementById('file-input');
        const btnSample = document.getElementById('btn-sample');
        const btnHint = document.getElementById('btn-hint');
        const clearMessage = document.getElementById('clear-message');

        let img = new Image();
        let pieces = [];
        let draggedPiece = null;
        let offsetX, offsetY;
        
        // パズル表示（完成枠）のサイズと中央座標
        const puzzleSize = 360; 
        let boardX, boardY;

        let rows = 4;
        let cols = 4;
        let showHint = false;
        let isCleared = false;

        // 子どもが喜びそうなランダム画像（トイプードル系に変更）
        const samples = [
            'https://images.unsplash.com/photo-1591160690555-5debfba289f0?q=80&w=400&auto=format&fit=crop',
            'https://images.unsplash.com/photo-1583337130417-3346a1be7dee?q=80&w=400&auto=format&fit=crop',
            'https://images.unsplash.com/photo-1598133894008-61f7fdb8cc3a?q=80&w=400&auto=format&fit=crop'
        ];
        let sampleIndex = 0;

        img.crossOrigin = "anonymous"; 
        img.src = samples[sampleIndex];
        img.onload = initGame;

        difficultySelect.addEventListener('change', () => { rows = cols = parseInt(difficultySelect.value); initGame(); });
        btnSample.addEventListener('click', () => { sampleIndex = (sampleIndex + 1) % samples.length; img.src = samples[sampleIndex]; });
        btnHint.addEventListener('mousedown', toggleHintTrue);
        btnHint.addEventListener('mouseup', toggleHintFalse);
        btnHint.addEventListener('mouseleave', toggleHintFalse);
        btnHint.addEventListener('touchstart', (e) => { e.preventDefault(); toggleHintTrue(); });
        btnHint.addEventListener('touchend', toggleHintFalse);

        function toggleHintTrue() { showHint = true; draw(); }
        function toggleHintFalse() { showHint = false; draw(); }

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => { img.src = event.target.result; };
            reader.readAsDataURL(file);
        });

        // 画面サイズに合わせてキャンバスをリサイズ
        function resizeCanvas() {
            canvas.width = gameArea.clientWidth;
            canvas.height = gameArea.clientHeight;
            boardX = (canvas.width - puzzleSize) / 2; // 中央配置
            boardY = (canvas.height - puzzleSize) / 2;
        }
        window.addEventListener('resize', () => { resizeCanvas(); draw(); });

        function initGame() {
            resizeCanvas();
            pieces = [];
            isCleared = false;
            clearMessage.style.display = 'none';

            const pw = puzzleSize / cols;
            const ph = puzzleSize / rows;

            // 凸凹のマトリックスを作成
            let hEdges = []; for(let r=0; r<=rows; r++) { hEdges[r] = []; for(let c=0; c<cols; c++) hEdges[r][c] = (r==0 || r==rows) ? 0 : (Math.random() > 0.5 ? 1 : -1); }
            let vEdges = []; for(let r=0; r<rows; r++) { vEdges[r] = []; for(let c=0; c<=cols; c++) vEdges[r][c] = (c==0 || c==cols) ? 0 : (Math.random() > 0.5 ? 1 : -1); }

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    pieces.push({
                        r: r, c: c,
                        sx: c * (img.width / cols), sy: r * (img.height / rows), sw: img.width / cols, sh: img.height / rows,
                        // 初期位置：中央の枠を避けて、画面全体にランダムに散らす
                        x: Math.random() * (canvas.width - pw), y: Math.random() * (canvas.height - ph),
                        tx: boardX + c * pw, ty: boardY + r * ph, // 目標
                        w: pw, h: ph, isLocked: false,
                        edges: { top: hEdges[r][c], right: vEdges[r][c+1], bottom: hEdges[r+1][c], left: vEdges[r][c] }
                    });
                }
            }
            // 枠と重なっているピースを外側に押し出す簡易調整
            pieces.forEach(p => {
                if(p.x > boardX - p.w && p.x < boardX + puzzleSize && p.y > boardY - p.h && p.y < boardY + puzzleSize) {
                    p.x = (Math.random() > 0.5) ? Math.random()*(boardX-p.w) : boardX+puzzleSize+Math.random()*(canvas.width-(boardX+puzzleSize)-p.w);
                    p.y = (Math.random() > 0.5) ? Math.random()*(boardY-p.h) : boardY+puzzleSize+Math.random()*(canvas.height-(boardY+puzzleSize)-p.h);
                }
            });
            pieces.sort(() => Math.random() - 0.5);
            draw();
        }

        // --- 修正ポイント：滑らかで一般的なジグソーパズルの形を描画 ---
        function drawPiecePath(p, x, y, pathOnly=false) {
            if(!pathOnly) ctx.beginPath();
            ctx.moveTo(x, y);
            
            // タブ（凸凹）の大きさの定義
            const tabSize = Math.min(p.w, p.h) * 0.28; // タブの高さ/深さ
            const neckW = Math.min(p.w, p.h) * 0.15;   // 首の細さ
            const headW = Math.min(p.w, p.h) * 0.25;   // 頭の広さ

            // 上の辺
            if (p.edges.top === 0) ctx.lineTo(x + p.w, y);
            else drawTab(x, y, x + p.w, y, p.edges.top, true);

            // 右の辺
            if (p.edges.right === 0) ctx.lineTo(x + p.w, y + p.h);
            else drawTab(x + p.w, y, x + p.w, y + p.h, p.edges.right, false);

            // 下の辺
            if (p.edges.bottom === 0) ctx.lineTo(x, y + p.h);
            else drawTab(x + p.w, y + p.h, x, y + p.h, p.edges.bottom, true);

            // 左の辺
            if (p.edges.left === 0) ctx.lineTo(x, y);
            else drawTab(x, y + p.h, x, y, p.edges.left, false);

            if(!pathOnly) ctx.closePath();

            // 汎用タブ描画サブ関数（ベジェ曲線で丸く描く）
            function drawTab(x1, y1, x2, y2, direction, isHorizontal) {
                const cx = (x1 + x2) / 2;
                const cy = (y1 + y2) / 2;
                const dx = x2 - x1;
                const dy = y2 - y1;
                
                // 垂直ベクトル（タブの飛び出す方向）
                let nx = isHorizontal ? 0 : -dy/Math.abs(dy);
                let ny = isHorizontal ? dx/Math.abs(dx) : 0;
                
                // 向き（凸か凹か）を掛ける
                nx *= direction * tabSize;
                ny *= direction * tabSize;

                // 首の広さのベクトル
                const hnx = isHorizontal ? neckW : 0;
                const hny = isHorizontal ? 0 : neckW;
                
                // 頭の広さのベクトル
                const awx = isHorizontal ? headW : 0;
                const awy = isHorizontal ? 0 : headW;

                // 4点のベジェ曲線で丸いタブを描画
                ctx.bezierCurveTo(cx - hnx + nx*0.2, cy - hny + ny*0.2,  cx - awx + nx, cy - awy + ny,  cx + nx, cy + ny);
                ctx.bezierCurveTo(cx + awx + nx, cy + awy + ny,  cx + hnx + nx*0.2, cy + hny + ny*0.2, x2, y2);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. 完成枠（中央）
            ctx.fillStyle = "rgba(255,255,255,0.6)";
            ctx.fillRect(boardX, boardY, puzzleSize, puzzleSize);
            ctx.lineWidth = 1;
            ctx.strokeStyle = "#aaa";
            // 枠線もジグソー型にする（おてほんの一部として）
            ctx.save();
            ctx.translate(boardX, boardY);
            for(let r=0; r<rows; r++){
                for(let c=0; c<cols; c++){
                    const p = { w:puzzleSize/cols, h:puzzleSize/rows, edges:{top:(r==0?0:1), right:(c==cols-1?0:1), bottom:(r==rows-1?0:1), left:(c==0?0:1)} };
                    ctx.save();
                    drawPiecePath(p, c*p.w, r*p.h);
                    ctx.stroke();
                    ctx.restore();
                }
            }
            ctx.restore();

            // 2. おてほん
            if (showHint) {
                ctx.save();
                ctx.globalAlpha = 0.3;
                ctx.drawImage(img, boardX, boardY, puzzleSize, puzzleSize);
                ctx.restore();
            }

            // 3. ピース描画（ロック優先）
            pieces.forEach(p => { if (p.isLocked) drawSinglePiece(p); });
            pieces.forEach(p => { if (!p.isLocked) drawSinglePiece(p); });
        }

        function drawSinglePiece(p) {
            ctx.save();
            // --- 修正ポイント：太い枠線を外側のみに描画して、重なりを綺麗にする ---
            drawPiecePath(p, p.x, p.y);
            ctx.clip();
            ctx.drawImage(img, p.sx, p.sy, p.sw, p.sh, p.x, p.y, p.w, p.h);
            ctx.restore();

            ctx.save();
            drawPiecePath(p, p.x, p.y);
            // ハマっていないピースは黒くて太い枠（画像と同じスタイル）
            ctx.lineWidth = p.isLocked ? 1 : 2.5; 
            ctx.strokeStyle = p.isLocked ? "rgba(0,0,0,0.1)" : "#333";
            ctx.stroke();
            ctx.restore();
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function startDrag(e) {
            if (isCleared) return;
            const pos = getMousePos(e);
            for (let i = pieces.length - 1; i >= 0; i--) {
                const p = pieces[i];
                if (p.isLocked) continue;
                // 当たり判定を少し広めに（凸部分もつかめるように）
                const margin = p.w * 0.2;
                if (pos.x > p.x-margin && pos.x < p.x + p.w+margin && pos.y > p.y-margin && pos.y < p.y + p.h+margin) {
                    draggedPiece = p;
                    offsetX = pos.x - p.x;
                    offsetY = pos.y - p.y;
                    pieces.push(pieces.splice(i, 1)[0]);
                    break;
                }
            }
        }

        function moveDrag(e) {
            if (!draggedPiece) return;
            if(e.cancelable) e.preventDefault();
            const pos = getMousePos(e);
            draggedPiece.x = pos.x - offsetX;
            draggedPiece.y = pos.y - offsetY;
            draw();
        }

        function endDrag() {
            if (!draggedPiece) return;
            const distance = Math.sqrt(Math.pow(draggedPiece.x - draggedPiece.tx, 2) + Math.pow(draggedPiece.y - draggedPiece.ty, 2));
            if (distance < 25) {
                draggedPiece.x = draggedPiece.tx;
                draggedPiece.y = draggedPiece.ty;
                draggedPiece.isLocked = true;
                playSnapSound();
            }
            draggedPiece = null;
            draw();
            checkClear();
        }

        function playSnapSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
                oscillator.type = 'sine'; oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                oscillator.start(); gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1); oscillator.stop(audioCtx.currentTime + 0.1);
            } catch(e) {} // AudioContextがブロックされた場合は無視
        }

        function checkClear() {
            if (pieces.every(p => p.isLocked) && !isCleared) {
                isCleared = true;
                clearMessage.style.display = 'block';
                // 簡易紙吹雪演出を追加しても良い
            }
        }

        canvas.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', moveDrag);
        window.addEventListener('mouseup', endDrag);
        canvas.addEventListener('touchstart', startDrag);
        canvas.addEventListener('touchmove', moveDrag, { passive: false });
        canvas.addEventListener('touchend', endDrag);

    </script>
</body>
</html>
